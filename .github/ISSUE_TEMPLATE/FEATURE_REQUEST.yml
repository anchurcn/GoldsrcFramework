name: Feature request
description: Suggest an improvement for GoldsrcFramework.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you would like.
    validations:
      required: true
