name: Bug report
description: Report a reproducible GoldsrcFramework problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the steps needed to reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: GoldsrcFramework version
      placeholder: "0.1.0"
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: text
